<section class="profile">
  <h2>Student Profile</h2>
  <p *ngIf="username">Logged in as <strong>{{ username }}</strong> (Auth Guard protected route).</p>
  <dl>
    <dt>Student ID</dt>
    <dd>{{ student.id }}</dd>
    <dt>Name</dt>
    <dd>{{ student.name }}</dd>
    <dt>Email</dt>
    <dd>{{ student.email }}</dd>
    <dt>Program</dt>
    <dd>{{ student.program }}</dd>
    <dt>Enrolled Credits</dt>
    <dd>{{ student.enrolledCredits }}</dd>
  </dl>
  <button type="button" (click)="logout()">Logout</button>
</section>
