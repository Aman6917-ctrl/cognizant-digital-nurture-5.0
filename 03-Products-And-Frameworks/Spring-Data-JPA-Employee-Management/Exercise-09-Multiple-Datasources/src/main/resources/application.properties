spring.application.name=employee-management-ex09

# H2 in-memory database (default for hands-on)
spring.datasource.url=jdbc:h2:mem:ems_ex9;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL (uncomment to run against a real database)
# spring.datasource.url=jdbc:mysql://localhost:3306/ems_ex09?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=secret
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=update

# Primary (employee) datasource — explicit configuration (see PrimaryDataSourceConfig)
spring.datasource.primary.jdbc-url=jdbc:h2:mem:ems_ex9_primary;DB_CLOSE_DELAY=-1
spring.datasource.primary.driver-class-name=org.h2.Driver
spring.datasource.primary.username=sa
spring.datasource.primary.password=

# Secondary (audit) datasource
spring.datasource.secondary.jdbc-url=jdbc:h2:mem:ems_ex9_secondary;DB_CLOSE_DELAY=-1
spring.datasource.secondary.driver-class-name=org.h2.Driver
spring.datasource.secondary.username=sa
spring.datasource.secondary.password=

# Disable default single-datasource auto-config for JPA (we define two factories)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
