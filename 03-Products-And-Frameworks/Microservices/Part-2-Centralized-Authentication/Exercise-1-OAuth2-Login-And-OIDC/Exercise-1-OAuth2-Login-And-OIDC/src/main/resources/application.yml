server:
  port: 9001
spring:
  application:
    name: oauth2-login-app
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope: openid, profile, email
        provider:
          google:
            issuer-uri: https://accounts.google.com
management:
  endpoints:
    web:
      exposure:
        include: health
