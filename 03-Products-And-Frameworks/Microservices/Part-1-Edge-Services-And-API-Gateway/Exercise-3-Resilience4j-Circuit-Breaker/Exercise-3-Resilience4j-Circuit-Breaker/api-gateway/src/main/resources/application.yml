server:
  port: 8086
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: payment-cb-route
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: paymentService
                fallbackUri: forward:/fallback/payments
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8763/eureka/
resilience4j:
  timelimiter:
    instances:
      paymentService:
        timeout-duration: 2s
  circuitbreaker:
    instances:
      paymentService:
        sliding-window-size: 5
        failure-rate-threshold: 50
